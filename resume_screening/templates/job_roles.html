{% extends 'screening.html' %}

{% block content %}
<div class="max-w-7xl mx-auto">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-stone-200">Job Roles</h1>
            <p class="text-stone-300 mt-1">Manage all your job descriptions</p>
        </div>
        <button id="create-job-btn-page" class="px-4 py-2 bg-gradient-to-r from-cyan-500 to-purple-600 text-white rounded-lg font-medium hover:opacity-90 transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Create New Job
        </button>
    </div>

    <!-- Job Cards Container -->
    <div id="jobs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Jobs will be loaded here -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-16">
        <svg class="w-24 h-24 mx-auto text-stone-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <h3 class="text-xl font-semibold text-stone-700 mb-2">No Job Roles Yet</h3>
        <p class="text-stone-500 mb-4">Create your first job role to get started</p>
        <button onclick="document.getElementById('create-job-btn-page').click()" class="px-6 py-2 bg-cyan-500 text-white rounded-lg hover:bg-cyan-600 transition-all">
            Create Job Role
        </button>
    </div>

</div>

<script>
    // Load all jobs
    async function loadJobs() {
        try {
            const response = await fetch('/api/job-roles/');
            const data = await response.json();
            
            const container = document.getElementById('jobs-container');
            const emptyState = document.getElementById('empty-state');
            
            if (data.jobs.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            container.innerHTML = '';
            
            data.jobs.forEach(job => {
                const card = createJobCard(job);
                container.appendChild(card);
            });
            
        } catch (error) {
            console.error('Error loading jobs:', error);
        }
    }
    
    // Create job card
    function createJobCard(job) {
        const card = document.createElement('div');
        card.className = 'bg-white border-2 border-stone-200 rounded-xl p-6 hover:shadow-lg transition-all hover:-translate-y-1';
        
        const statusColor = job.status === 'active' ? 'green' : job.status === 'closed' ? 'red' : 'yellow';
        
        card.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="text-xl font-bold text-stone-800 mb-1">${job.title}</h3>
                    <span class="px-2 py-1 text-xs rounded-full bg-${statusColor}-100 text-${statusColor}-700 border border-${statusColor}-300">
                        ${job.status.toUpperCase()}
                    </span>
                </div>
                <button onclick="deleteJob(${job.id})" class="text-red-500 hover:text-red-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
            </div>
            
            <p class="text-sm text-stone-600 mb-4 line-clamp-3">${job.description}</p>
            
            <div class="space-y-2 mb-4">
                <div class="flex items-center gap-2 text-sm text-stone-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span>${job.location || 'Not specified'}</span>
                </div>
                
                <div class="flex items-center gap-2 text-sm text-stone-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>${job.experience_required} years experience</span>
                </div>
                
                <div class="flex items-center gap-2 text-sm text-stone-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <span>Posted ${job.created_at}</span>
                </div>
            </div>
            
            <div class="mb-4">
                <p class="text-xs text-stone-500 mb-2">Required Skills:</p>
                <div class="flex flex-wrap gap-1">
                    ${job.required_skills.slice(0, 5).map(skill => 
                        `<span class="px-2 py-1 text-xs rounded-md bg-cyan-500/10 text-cyan-700 border border-cyan-500/20">${skill}</span>`
                    ).join('')}
                    ${job.required_skills.length > 5 ? `<span class="px-2 py-1 text-xs text-stone-500">+${job.required_skills.length - 5} more</span>` : ''}
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="viewJobDetails(${job.id})" class="flex-1 px-3 py-2 bg-cyan-500/10 text-cyan-700 rounded-lg text-sm font-medium border border-cyan-500/20 hover:bg-cyan-500/20 transition-all">
                    View Full Details
                </button>
                <button onclick="findCandidates(${job.id}, '${job.title}')" class="flex-1 px-3 py-2 bg-gradient-to-r from-cyan-500 to-purple-600 text-white rounded-lg text-sm font-medium hover:opacity-90 transition-all">
                    Find Candidates
                </button>
            </div>
        `;
        
        return card;
    }
    
    // Delete job
    async function deleteJob(jobId) {
        if (!confirm('Are you sure you want to delete this job role?')) return;
        
        try {
            await fetch(`/api/job-roles/${jobId}/delete/`, {
                method: 'DELETE'
            });
            loadJobs(); // Reload
        } catch (error) {
            console.error('Error deleting job:', error);
        }
    }
    
    // View job details - Show in modal or new section
    async function viewJobDetails(jobId) {
        try {
            const response = await fetch('/api/job-roles/');
            const data = await response.json();
            
            // Find the specific job
            const job = data.jobs.find(j => j.id === jobId);
            if (!job) return;
            
            // Create modal or details section
            const detailsHTML = `
                <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" id="job-modal">
                    <div class="bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
                        <div class="flex justify-between items-start mb-4">
                            <h2 class="text-2xl font-bold text-stone-800">${job.title}</h2>
                            <button onclick="document.getElementById('job-modal').remove()" class="text-stone-500 hover:text-stone-700">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                        
                        <div class="space-y-4">
                            <div>
                                <h3 class="font-semibold text-stone-700 mb-1">Description</h3>
                                <p class="text-stone-600">${job.description}</p>
                            </div>
                            
                            <div>
                                <h3 class="font-semibold text-stone-700 mb-1">Required Skills</h3>
                                <div class="flex flex-wrap gap-2">
                                    ${job.required_skills.map(skill => 
                                        `<span class="px-3 py-1 bg-cyan-500/10 text-cyan-700 border border-cyan-500/20 rounded-lg">${skill}</span>`
                                    ).join('')}
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <h3 class="font-semibold text-stone-700 mb-1">Experience Required</h3>
                                    <p class="text-stone-600">${job.experience_required} years</p>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-stone-700 mb-1">Location</h3>
                                    <p class="text-stone-600">${job.location || 'Not specified'}</p>
                                </div>
                            </div>
                            
                            <div>
                                <h3 class="font-semibold text-stone-700 mb-1">Salary Range</h3>
                                <p class="text-stone-600">${job.salary_range || 'Not specified'}</p>
                            </div>
                            
                            <div>
                                <h3 class="font-semibold text-stone-700 mb-1">Posted Date</h3>
                                <p class="text-stone-600">${job.created_at}</p>
                            </div>
                            
                            <div>
                                <h3 class="font-semibold text-stone-700 mb-1">Status</h3>
                                <span class="px-3 py-1 ${job.status === 'closed' ? 'bg-red-100 text-red-700 border border-red-300' : 'bg-green-100 text-green-700 border border-green-300'} rounded-full text-sm">${job.status.toUpperCase()}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', detailsHTML);
            
        } catch (error) {
            console.error('Error loading job details:', error);
        }
    }
    
    // Find candidates for this job
    function findCandidates(jobId, jobTitle) {
        // Navigate to main page and trigger search
        window.location.href = `/?search=${encodeURIComponent(jobTitle)}`;
    }
    
    // Load jobs on page load
    loadJobs();

    // Create new job button handler
    const createJobBtnPage = document.getElementById('create-job-btn-page');
    if (createJobBtnPage) {
        createJobBtnPage.addEventListener('click', () => {
            window.location.href = '/?action=create_job';
        });
    }
    
    
</script>
{% endblock %}
